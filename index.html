<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 4th BUGITECH INVESTMENT SHOW - 등록</title>
    <link href="[https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css](https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css)" rel="stylesheet">
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap)');
        
        body { 
            background-color: #0b0e1d; 
            background-image: 
                linear-gradient(rgba(11, 14, 29, 0.8), rgba(11, 14, 29, 0.8)),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsPSJub25lIiBzdHJva2U9IiMyMzI4NWIiIHN0cm9rZS13aWR0aD0iMC41Ij48cGF0aCBkPSJNMCAwaDQwdjQwSDB6Ii8+PC9nPjwvc3ZnPg==');
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 포스터의 물결 느낌을 주는 배경 요소 */
        .neon-wave {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 212, 0.1) 0%, transparent 60%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #ff3dae;
            box-shadow: 0 0 10px rgba(255, 61, 174, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(90deg, #ff8c42, #ff3dae);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 61, 174, 0.4);
        }

        .logo-font {
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-6">
    <div class="neon-wave"></div>
    
    <div class="container-box w-full max-w-md glass-card p-8 rounded-3xl relative overflow-hidden">
        <!-- 포스터 상단 로고 느낌 -->
        <div class="flex justify-between items-start mb-10">
            <div class="text-white text-[10px] opacity-70">
                <p>BUSAN METROPOLITAN CITY</p>
                <p>BUSAN STARTUP INVESTMENT AGENCY</p>
            </div>
            <div class="w-6 h-6 border-2 border-pink-500 rounded-sm rotate-45"></div>
        </div>

        <div class="mb-10">
            <h2 class="text-pink-500 font-bold text-sm mb-1">2026.04.02 THU</h2>
            <h1 class="text-white text-3xl font-black logo-font leading-none">
                BUGITECH<br>INVESTMENT SHOW
            </h1>
            <div class="inline-block mt-4 px-3 py-1 bg-gradient-to-r from-orange-400 to-pink-500 text-white text-xs font-bold rounded-sm">
                방문객 등록
            </div>
        </div>

        <form id="visitorForm" class="space-y-6">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-widest">Name</label>
                <input type="text" id="name" required placeholder="성함을 입력하세요"
                    class="w-full px-4 py-3 rounded-xl input-field focus:outline-none text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-widest">Affiliation</label>
                <input type="text" id="affiliation" required placeholder="소속 기관/회사"
                    class="w-full px-4 py-3 rounded-xl input-field focus:outline-none text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-widest">Position</label>
                <input type="text" id="position" required placeholder="직함"
                    class="w-full px-4 py-3 rounded-xl input-field focus:outline-none text-sm">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full btn-gradient text-white py-4 rounded-xl font-bold text-lg shadow-lg">
                SUBMIT
            </button>
        </form>

        <div id="statusMsg" class="hidden mt-6 p-4 rounded-xl text-center font-medium text-sm"></div>
    </div>

    <script>
        // 🚨 여기에 본인의 구글 웹 앱 URL을 붙여넣으세요!
        const GAS_URL = https://script.google.com/macros/s/AKfycbztJwA1GdHKBBkms6_lpBx4gVhDHlHRbdyEge2caU1uriv8BHIEACGcLyByPP9lvpd3/exec

        const form = document.getElementById('visitorForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerText = "SENDING...";
            
            const data = {
                name: document.getElementById('name').value,
                affiliation: document.getElementById('affiliation').value,
                position: document.getElementById('position').value
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                showStatus("등록이 완료되었습니다. 환영합니다!", "success");
                form.reset();
            } catch (error) {
                showStatus("오류가 발생했습니다. 다시 시도해주세요.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "SUBMIT";
            }
        });

        function showStatus(text, type) {
            msg.innerText = text;
            msg.classList.remove('hidden', 'bg-green-500/20', 'text-green-300', 'bg-red-500/20', 'text-red-300');
            
            if (type === 'success') {
                msg.classList.add('bg-green-500/20', 'text-green-300');
            } else {
                msg.classList.add('bg-red-500/20', 'text-red-300');
            }
        }
    </script>
</body>
</html>
