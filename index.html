<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문객 등록</title>
    <link href="[https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css](https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css)" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; }
        .container-box { max-width: 450px; margin: 40px auto; }
    </style>
</head>
<body class="px-4">
    <div class="container-box bg-white p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">방문객 등록</h1>
            <p class="text-gray-500 mt-2 text-sm">정보를 입력해주시면 자동으로 등록됩니다.</p>
        </div>

        <form id="visitorForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">성함</label>
                <input type="text" id="name" required placeholder="홍길동"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">소속</label>
                <input type="text" id="affiliation" required placeholder="회사명 또는 단체명"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">직함</label>
                <input type="text" id="position" required placeholder="직위/직함"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg">
                등록 완료
            </button>
        </form>

        <div id="statusMsg" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>
    </div>

    <script>
        // 🚨 여기에 본인의 구글 웹 앱 URL을 붙여넣으세요!
        const GAS_URL = https://script.google.com/macros/s/AKfycbztJwA1GdHKBBkms6_lpBx4gVhDHlHRbdyEge2caU1uriv8BHIEACGcLyByPP9lvpd3/exec

        const form = document.getElementById('visitorForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btn.disabled = true;
            btn.innerText = "처리 중...";
            
            const data = {
                name: document.getElementById('name').value,
                affiliation: document.getElementById('affiliation').value,
                position: document.getElementById('position').value
            };

            try {
                // 구글 시트로 데이터 전송
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                showStatus("정상적으로 등록되었습니다. 감사합니다!", "success");
                form.reset();
            } catch (error) {
                console.error(error);
                showStatus("오류가 발생했습니다. 다시 시도해주세요.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "등록 완료";
            }
        });

        function showStatus(text, type) {
            msg.innerText = text;
            msg.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (type === 'success') {
                msg.classList.add('bg-green-100', 'text-green-700');
            } else {
                msg.classList.add('bg-red-100', 'text-red-700');
            }
            
            setTimeout(() => { msg.classList.add('hidden'); }, 4000);
        }
    </script>
</body>
</html>
